# Production compose — pulls pre-built images from GHCR.
# No `build` sections — images come from GitHub Actions CI.
#
# Usage on VPS:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d cover
#   ... (then run bootstrap.sh with --prod flag or follow manual steps)

services:
  cover:
    image: ghcr.io/construct-msg/construct-veil/cover:latest
    container_name: veil-front-cover
    restart: unless-stopped
    ports:
      - "80:80"
    expose:
      - "8080"
    volumes:
      - certbot-www:/var/www/certbot:ro

  certbot:
    image: certbot/certbot:latest
    container_name: veil-front-certbot
    entrypoint: certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    restart: "no"

  relay:
    image: ghcr.io/construct-msg/construct-veil/relay:latest
    container_name: veil-front-relay
    restart: unless-stopped
    depends_on:
      cover:
        condition: service_started
    ports:
      - "443:443"
    volumes:
      - letsencrypt:/etc/letsencrypt:ro
      - ./data/tickets:/etc/veil-front:ro
    environment:
      RUST_LOG: "${RUST_LOG:-info}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      construct-veil-relay
      --listen 0.0.0.0:443
      --cert /etc/letsencrypt/live/${DOMAIN}/fullchain.pem
      --key  /etc/letsencrypt/live/${DOMAIN}/privkey.pem
      --site cover:8080
      --backend ${BACKEND:-host.docker.internal:50051}
      --tickets /etc/veil-front/tickets.json
    healthcheck:
      test: ["CMD-SHELL", "echo | openssl s_client -connect 127.0.0.1:443 -servername $$(echo $${DOMAIN}) -brief 2>&1 | grep -q 'Verification: OK\\|verify error' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  letsencrypt:
  certbot-www:
