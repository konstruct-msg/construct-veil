# Production compose — pulls pre-built images from GHCR.
# No `build` sections — images come from GitHub Actions CI.
#
# Usage on VPS:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d cover
#   ... (then run bootstrap.sh with --prod flag or follow manual steps)

services:
  cover:
    image: ghcr.io/konstruct-msg/construct-veil/cover:latest
    container_name: veil-front-cover
    restart: unless-stopped
    ports:
      - "80:80"
    expose:
      - "8080"
    volumes:
      - certbot-www:/var/www/certbot:ro

  certbot:
    image: certbot/certbot:latest
    container_name: veil-front-certbot
    entrypoint: certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    restart: "no"

  relay:
    image: ghcr.io/konstruct-msg/construct-veil/relay:latest
    container_name: veil-front-relay
    restart: unless-stopped
    depends_on:
      cover:
        condition: service_started
    ports:
      - "443:443"
    volumes:
      - letsencrypt:/etc/letsencrypt:ro
    environment:
      RUST_LOG: "${RUST_LOG:-info}"
      # Passed through so the healthcheck's `openssl s_client -servername ${DOMAIN}`
      # expands to a real hostname inside the container. Without it the SNI is empty,
      # openssl shifts and uses `-brief` as the servername, and the relay rejects the
      # handshake (ServerNameMustContainOneHostName) → container marked unhealthy.
      DOMAIN: "${DOMAIN}"
      # Issuer (home-server) Ed25519 PUBLIC key, hex. The relay validates each client
      # capability's signature against this — offline, no ticket store. MUST equal the
      # veil-service issuer pubkey and the app's relayConfigSigningKey.
      ISSUER_PUBKEY: "${ISSUER_PUBKEY}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Remote front topology: this relay (e.g. in RU, reachable by IP) terminates
    # the veil-TLS and re-wraps the gRPC stream in a fresh TLS connection to the
    # Construct backend's public endpoint (Traefik :443 → h2c → envoy:8080).
    # --backend-sni keeps the cert hostname correct even when BACKEND is set to a
    # raw IP (e.g. when the backend domain is DNS-blocked on the relay's network).
    command: >
      --listen 0.0.0.0:443
      --cert /etc/letsencrypt/live/${DOMAIN}/fullchain.pem
      --key  /etc/letsencrypt/live/${DOMAIN}/privkey.pem
      --site cover:8080
      --backend ${BACKEND:-ams.konstruct.cc:443}
      --backend-tls
      --backend-sni ${BACKEND_SNI:-ams.konstruct.cc}
      --issuer-pubkey ${ISSUER_PUBKEY}
    healthcheck:
      test: ["CMD-SHELL", "echo | openssl s_client -connect 127.0.0.1:443 -servername $$(echo $${DOMAIN}) -brief 2>&1 | grep -q 'Verification: OK\\|verify error' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  letsencrypt:
  certbot-www:
