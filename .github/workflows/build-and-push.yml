name: Build & Push Docker images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Cover-site ──────────────────────────────────────────────────────
      - name: Build & push cover image
        uses: docker/build-push-action@v6
        with:
          context: deploy/cover-site
          file: deploy/Dockerfile.cover
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cover:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Relay ───────────────────────────────────────────────────────────
      - name: Build & push relay image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.relay
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/relay:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
